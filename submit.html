<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Professional Glassmorphism</title>
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link rel="stylesheet" href="submit.css">
        <script src="submit.js" defer></script>
    </head>
    <body>

        <div class="back-btn-container">
            <a href="New Portfolio.html"><button id="theme-btn">↩</button></a>
        </div>

        <div class="main-wrapper">

            <div class="login-box">
                <form id="loginForm">
                    <h2>Let's Message</h2>

                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" required
                            name="username" />
                        <label>Username</label>
                    </div>

                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <!-- កែទៅជា icon សំបុត្រ -->
                        <input type="email" id="email" required name="email" />
                        <label>Your Email</label>
                    </div>

                    <div class="input-group">
                        <i class="fas fa-comment-dots"></i>
                        <!-- កែទៅជា icon សារ -->
                        <input type="text" id="text" required name="text" />
                        <label>Your Message</label>
                    </div>

                    <button type="submit" class="login-btn" id="submitBtn">Send
                        Message</button>
                </form>
            </div>

            <div class="clock-container">
                <div class="clock">
                    <div class="outer-glow"></div>
                    <div class="numbers">
                        <span style="--i:1;"><b>1</b></span>
                        <span style="--i:2;"><b>2</b></span>
                        <span style="--i:3;"><b>3</b></span>
                        <span style="--i:4;"><b>4</b></span>
                        <span style="--i:5;"><b>5</b></span>
                        <span style="--i:6;"><b>6</b></span>
                        <span style="--i:7;"><b>7</b></span>
                        <span style="--i:8;"><b>8</b></span>
                        <span style="--i:9;"><b>9</b></span>
                        <span style="--i:10;"><b>10</b></span>
                        <span style="--i:11;"><b>11</b></span>
                        <span style="--i:12;"><b>12</b></span>
                    </div>
                    <div class="marks"></div>
                    <div class="hand hour" id="hour"></div>
                    <div class="hand min" id="min"></div>
                    <div class="hand sec" id="sec"></div>
                    <div class="center-dot"></div>
                </div>
            </div>

        </div>

    </body>
</html>
